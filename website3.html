<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Integral University</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:url(https://www.iul.ac.in/About/TurnJS/Imgpdfbg/Back_Img_Mor.jpg')
    no-repeat center center/cover;
    min-height:100vh;
}

.overlay{
    min-height:100vh;
    background:rgba(0,0,0,0.6);
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 80px;
    background:rgba(0,0,0,0.3);
}
header h1 {
      color: white;
      font-size: 32px;
    }

/* Navigation */
nav{
    text-align:center;
    padding:15px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 20px;
    font-size:18px;
    transition:0.3s;
}

nav a:hover{
    color:#4CAF50;
}

/* Main Section */
main{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

/* Contact Form */
.contact-box{
    background:white;
    width:400px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.contact-box h2{
    text-align:center;
    margin-bottom:20px;
    color:#4CAF50;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#4CAF50;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#388E3C;
}

#response{
    margin-top:15px;
    text-align:center;
    color:green;
    font-weight:bold;
}

/* Footer */
footer{
    position:absolute;
    bottom:0;
    width:100%;
    text-align:center;
    color:white;
    padding:15px;
    background:rgba(0,0,0,0.5);
}

@media(max-width:500px){
    .contact-box{
        width:90%;
    }
}
</style>
</head>

<body>

<div class="overlay">

<header>
    <h1>Contact Integral University</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="website2.html">Courses</a>
    <a href="website3.html">Contact</a>
</nav>

<main>
    <div class="contact-box">
        <h2>Contact Us</h2>

        <form id="contact-form">
            <input type="text" id="name" placeholder="Enter Your Name" required>

            <input type="email" id="email" placeholder="Enter Your Email" required>

            <textarea id="message"
                placeholder="Enter Your Message"
                required></textarea>

            <button type="submit">Submit</button>
        </form>

        <p id="response"></p>
    </div>
</main>

<footer>
    &copy; 2026 Integral University | All Rights Reserved
</footer>

</div>

<script>
document.getElementById('contact-form')
.addEventListener('submit', function(e){

    e.preventDefault();

    const name =
    document.getElementById('name').value;

    document.getElementById('response')
    .textContent =
    `Thank you, ${name}! We will get back to you soon.`;

    this.reset();
});
</script>

</body>
</html>
