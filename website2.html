<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - Integral University</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: url('https://www.iul.ac.in/img/overviewthree.JPG') no-repeat center center/cover;
      min-height: 100vh;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(0, 0, 0, 0.6);
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 80px;
      background: rgba(0, 0, 0, 0.3);
    }

    header h1 {
      color: white;
      font-size: 32px;
    }

    /* Navigation */
    nav {
      text-align: center;
      padding: 15px;
      background: rgba(255, 255, 255, 0.1);
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 20px;
      font-size: 18px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #4CAF50;
    }

    /* Main Content */
    main {
      padding: 40px;
      text-align: center;
    }

    main h2 {
      color: white;
      margin-bottom: 30px;
      font-size: 35px;
    }

    /* Course Cards */
    .course-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
    }

    .course-card {
      width: 250px;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      transition: 0.3s;
    }

    .course-card:hover {
      transform: translateY(-8px);
    }

    .course-card h3 {
      color: #4CAF50;
      margin-bottom: 10px;
    }

    .course-card p {
      color: #555;
    }

    /* Footer */
    footer {
      position: absolute;
      bottom: 0;
      width: 100%;
      text-align: center;
      color: white;
      padding: 15px;
      background: rgba(0, 0, 0, 0.5);
    }

    @media(max-width:768px) {
      .course-card {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <div class="overlay">

    <header>
      <h1>Integral University - Courses</h1>
    </header>

    <nav>
      <a href="website1.html">Home</a>
      <a href="website2.html">Courses</a>
      <a href="website3.html">Contact</a>
    </nav>

    <main>
      <h2>Available Courses</h2>

      <div class="course-container" id="course-container"></div>
    </main>

    <footer>
      &copy; 2026 Integral University | All Rights Reserved
    </footer>

  </div>

  <script>

    const courses = [
      "Computer Applications",
      "Computer Science",
      "Engineering",
      "Business Administration",
      "Nursing",
      "Law",
      "Pharmacy",
      "Hotel Management"
    ];

    const container = document.getElementById("course-container");

    courses.forEach(course => {
      const card = document.createElement("div");
      card.className = "course-card";

      card.innerHTML = `
        <h3>${course}</h3>
        <p>Learn from experienced faculty and build a successful career.</p>
    `;

      container.appendChild(card);
    });

  </script>

</body>

</html>
